<div class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
  <header
    class="w-full border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50"
  >
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <button class="flex items-center gap-2" type="button" (click)="goHome()">
        <div class="text-primary">
          <svg class="w-8 h-8" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor" />
          </svg>
        </div>
        <span class="text-xl font-bold tracking-tight">Fintech</span>
      </button>
      <div>
        <button
          class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors"
          type="button"
          (click)="goHelp()"
        >
          Aide
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center">
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-4xl">
          Créer un compte
        </h1>
        <p class="mt-3 text-base text-slate-600 dark:text-slate-400">
          Rejoignez la révolution financière et gérez vos actifs en toute sécurité.
        </p>
      </div>

      <div class="mt-8 bg-white dark:bg-slate-900/50 p-8 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800">
        <form class="space-y-5" (ngSubmit)="onSubmit()">
          <div>
            <label
              class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
              for="full-name"
              >Nom complet</label
            >
            <div class="relative">
              <input
                class="block w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                id="full-name"
                name="fullName"
                placeholder="Jean Dupont"
                type="text"
                [(ngModel)]="name"
                required
              />
            </div>
          </div>

          <div>
            <label
              class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
              for="email"
              >Adresse email</label
            >
            <div class="relative">
              <input
                class="block w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                id="email"
                name="email"
                placeholder="jean.dupont@exemple.com"
                type="email"
                [(ngModel)]="email"
                required
              />
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label
                class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                for="password"
                >Mot de passe</label
              >
              <div class="relative group">
                <input
                  class="block w-full pl-4 pr-10 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="password"
                  required
                />
                <button
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary"
                  type="button"
                  (click)="togglePassword()"
                >
                  <span class="material-symbols-outlined text-xl"
                    >{{ showPassword ? 'visibility_off' : 'visibility' }}</span
                  >
                </button>
              </div>
            </div>
            <div>
              <label
                class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5"
                for="confirm-password"
                >Confirmation</label
              >
              <div class="relative group">
                <input
                  class="block w-full pl-4 pr-10 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500"
                  id="confirm-password"
                  name="confirmPassword"
                  placeholder="••••••••"
                  [type]="showPassword ? 'text' : 'password'"
                  [(ngModel)]="confirmPassword"
                  required
                />
              </div>
            </div>
          </div>

          <div class="flex items-start">
            <div class="flex items-center h-5">
              <input
                class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-800"
                id="terms"
                name="terms"
                type="checkbox"
                [(ngModel)]="acceptedTerms"
                required
              />
            </div>
            <div class="ml-3 text-sm">
              <label class="font-medium text-slate-600 dark:text-slate-400" for="terms">
                J'accepte les
                <button class="text-primary hover:underline" type="button" (click)="goTerms()">
                  conditions d'utilisation
                </button>
                et la
                <button class="text-primary hover:underline" type="button" (click)="goPrivacy()">
                  politique de confidentialité
                </button>.
              </label>
            </div>
          </div>

          <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>

          <button
            class="w-full flex justify-center py-3.5 px-4 rounded-lg bg-primary text-white text-base font-bold shadow-lg shadow-primary/25 hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]"
            type="submit"
            [disabled]="loading"
          >
            {{ loading ? 'Création...' : 'Créer mon compte' }}
          </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 dark:border-slate-800 pt-6">
          <p class="text-sm text-slate-600 dark:text-slate-400">
            Déjà un compte ?
            <button class="font-bold text-primary hover:text-primary/80 transition-colors" type="button" (click)="goLogin()">
              Se connecter
            </button>
          </p>
        </div>
      </div>

      <div class="flex items-center justify-center gap-6 pt-4 text-slate-400 dark:text-slate-600">
        <div class="flex items-center gap-1 text-xs">
          <span class="material-symbols-outlined text-sm">lock</span>
          Sécurisé par AES-256
        </div>
        <div class="flex items-center gap-1 text-xs">
          <span class="material-symbols-outlined text-sm">verified_user</span>
          Conforme RGPD
        </div>
      </div>
    </div>
  </main>

  <footer class="py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <p class="text-center text-xs text-slate-500 dark:text-slate-600">
        © 2024 Fintech S.A. Tous droits réservés. L'investissement comporte des risques.
      </p>
    </div>
  </footer>
</div>
